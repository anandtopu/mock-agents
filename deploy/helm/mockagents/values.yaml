# Default values for the mockagents Helm chart.
# Override with `helm install --values my-values.yaml` or `--set key=value`.

# -- Number of replicas. MockAgents is stateful only via its optional
# -- SQLite interaction log; for a pure mock server multiple replicas
# -- behave as independent servers, which is fine for load-balanced
# -- read-only traffic.
replicaCount: 1

image:
  # -- Container image to pull. Must contain the mockagents Go binary.
  repository: mockagents/mockagents
  # -- Image tag. Defaults to .Chart.AppVersion when empty.
  tag: ""
  # -- imagePullPolicy passed to the Deployment.
  pullPolicy: IfNotPresent

# -- imagePullSecrets for private registries.
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a dedicated ServiceAccount for this release.
  create: true
  # -- Extra annotations on the ServiceAccount (e.g. IAM role bindings).
  annotations: {}
  # -- Name of the ServiceAccount. Generated when empty.
  name: ""

podAnnotations: {}
podLabels: {}

# -- Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  fsGroup: 100

# -- Container security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Resource requests and limits. Defaults are intentionally modest
# -- because the Go binary idles under 30 MiB.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Node placement controls.
nodeSelector: {}
tolerations: []
affinity: {}

# -- Server log level: debug, info, warn, error.
logLevel: info

service:
  type: ClusterIP
  # -- HTTP port exposed to clients.
  port: 8080
  # -- Explicit nodePort when type=NodePort. Leave empty to auto-assign.
  nodePort: ""
  annotations: {}

ingress:
  # -- Set to true to create an Ingress resource in front of the service.
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mockagents.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Agent definitions to mount into the container at /agents. There are
# two ways to provide them:
#
#   1. agents.inline: a map of filename -> YAML string. The chart
#      renders a ConfigMap from this map. Good for small demos and
#      single-agent deployments.
#
#   2. agents.existingConfigMap: name of a pre-created ConfigMap whose
#      keys are agent YAML files. Good for production where agents are
#      versioned alongside infrastructure code or GitOps manifests.
#
# When both are empty the Deployment still starts, but the server will
# exit with "no valid agent definitions found" because /agents is empty.
agents:
  existingConfigMap: ""
  inline: {}
  # inline:
  #   minimal.yaml: |
  #     apiVersion: mockagents/v1
  #     kind: Agent
  #     metadata:
  #       name: echo-agent
  #     spec:
  #       protocol: openai-chat-completions
  #       behavior:
  #         scenarios:
  #           - name: default
  #             response:
  #               content: "I received your message."

# -- Liveness and readiness probe tuning. Defaults hit /api/v1/health.
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3

# -- Optional ephemeral data directory for the SQLite interaction log.
# -- When enabled, an emptyDir volume is mounted at /data. Set to a
# -- specific PVC name to persist the log across pod restarts.
persistence:
  enabled: false
  existingClaim: ""
  size: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClass: ""

# -- Extra environment variables merged into the container env.
env: {}
# env:
#   OTEL_EXPORTER_OTLP_ENDPOINT: http://collector.monitoring.svc:4318

# -- Extra command-line flags appended to `mockagents start`.
extraArgs: []

# --- v0.2 additions ---

# -- HorizontalPodAutoscaler for the mockagents Deployment. Off by
# -- default (Deployment.replicas wins); flip enabled=true to scale on
# -- CPU and/or memory. The chart targets the autoscaling/v2 API and
# -- never falls back to v2beta — confirmed clean against Kubernetes
# -- 1.24+ via the kubeVersion constraint in Chart.yaml.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  # Set to a non-empty string to scale on CPU utilization.
  targetCPUUtilizationPercentage: 70
  # Set to a non-empty string to also scale on memory utilization.
  targetMemoryUtilizationPercentage: ""
  # Optional behavior block for HPA stabilization windows. Helm
  # passes this through verbatim — leave empty for k8s defaults.
  behavior: {}

# -- PodDisruptionBudget so a voluntary disruption (node drain,
# -- cluster upgrade) cannot evict every replica at once. Disabled by
# -- default because the v0.1 default replicaCount is 1, where a PDB
# -- would block drains entirely; flip enabled=true once you raise
# -- replicaCount or autoscaling.minReplicas.
podDisruptionBudget:
  enabled: false
  # Exactly one of minAvailable / maxUnavailable should be set.
  minAvailable: 1
  maxUnavailable: ""

# -- NetworkPolicy locking down ingress + egress traffic. Off by
# -- default because cluster admins typically own the policy
# -- baseline. When enabled the rules below assume:
# --   * Ingress from Pods carrying the matching client labels and
# --     from any Pod in a namespace carrying the namespace labels.
# --   * Optional ingress from anywhere on the service port (set
# --     allowExternalIngress=true) so an Ingress controller in a
# --     different namespace can reach the pods without per-controller
# --     wiring.
# --   * DNS egress to kube-dns plus operator-supplied egress rules.
networkPolicy:
  enabled: false
  # Allow traffic from any pod in the same namespace by default. Set
  # to false to require explicit ingressFrom rules.
  allowSameNamespace: true
  # Allow inbound traffic on the service port from anywhere (e.g.
  # for a cluster-wide Ingress controller).
  allowExternalIngress: false
  ingressFrom: []
  # Example:
  # ingressFrom:
  #   - podSelector:
  #       matchLabels: {app.kubernetes.io/name: my-app}
  #   - namespaceSelector:
  #       matchLabels: {team: platform}
  egressRules: []
  # Always allow egress to kube-dns even when egressRules is empty.
  allowDNS: true

# -- Prometheus Operator ServiceMonitor. Requires the Prometheus
# -- Operator CRDs to be installed; the chart silently skips this
# -- template otherwise. The exposed metrics shape is whatever the
# -- mockagents binary prints at /metrics — currently the standard
# -- Go runtime + log worker counters.
serviceMonitor:
  enabled: false
  # Override the namespace the ServiceMonitor is created in. Default
  # is the release namespace.
  namespace: ""
  # Scrape interval; the Prometheus default of 30s is plenty for a
  # mock server.
  interval: 30s
  scrapeTimeout: 10s
  # Path the metrics endpoint serves on. Matches the Go binary
  # default; override only if extraArgs changes the route.
  path: /metrics
  # Extra labels added to the ServiceMonitor (e.g. release: kube-prom)
  # so the right Prometheus instance picks it up.
  labels: {}
  # Extra labels added by metricRelabelings.
  metricRelabelings: []
  relabelings: []
