{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mockagents.fullname" . }}
  labels:
    {{- include "mockagents.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mockagents.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
    {{- if .Values.networkPolicy.allowExternalIngress }}
    - from: []
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
    {{- with .Values.networkPolicy.ingressFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowDNS }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- with .Values.networkPolicy.egressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
